title: cocotb ↔ UVM roles
footer: learn_cocotb — cocotb uvm map
slides:
- type: title
  title: cocotb ↔ UVM roles
  subtitle: Plain cocotb is Python driving a simulator with async triggers and DUT
    handles
  notes: 'Plain cocotb is Python driving a simulator with async triggers and DUT handles.
    pyuvm adds UVM-shaped components on top. SystemVerilog UVM is the same job in
    another language—tests, drivers, agents, and scoreboards. This module maps roles,
    not APIs: when someone says virtual interface, you know the cocotb side is dut
    dot signal.'
- type: bullets
  title: Six role pairs
  bullets:
  - Six pairs bridge the worlds
  - Cocotb test decorator and Makefile module versus UVM test plus test name plusarg
  - 'Time: await RisingEdge or Timer versus posedge and delay'
  - 'DUT access: dut handle versus virtual interface'
  - 'Drive: Python pin assigns versus driver through vif'
  - 'Structure: pyuvm agent versus uvm agent'
  notes: 'Six pairs bridge the worlds. Test entry: cocotb test decorator and Makefile
    module versus UVM test plus test name plusarg. Time: await RisingEdge or Timer
    versus posedge and delay. DUT access: dut handle versus virtual interface. Drive:
    Python pin assigns versus driver through vif. Structure: pyuvm agent versus uvm
    agent. Check: assert or scoreboard versus predict and observe scoreboard. Same
    verification jobs—different packaging.'
- type: image
  title: Browser lab
  image: assets/lab-starter.png
  caption: Browser lab starter
  notes: In the browser lab track, open the cocotb versus UVM map. You will see a
    challenge panel, role cards on both sides, and a mapped checklist. Load the starter—DUT
    handle paired with virtual interface already mapped—then select another pair and
    mark it mapped to build the bridge. Work a few challenges and use Check when ready.
    Orient here; do not tour every button.
- type: bullets
  title: Real cocotb practice
  bullets:
  - In the real cocotb track, restate the map on paper before you open a Makefile
    or UVM tree
  - Pick three pairs, test, await
  - 'Optional: open the lab’s source sketch and read the comment header'
  - This module is role literacy, not choosing pyuvm versus plain cocotb for your
    project yet
  notes: 'In the real cocotb track, restate the map on paper before you open a Makefile
    or UVM tree. Pick three pairs—test, await, and check—and write the cocotb side
    in one column and the UVM side in the other. Optional: open the lab’s source sketch
    and read the comment header—it lists the rough map in one place. This module is
    role literacy—not choosing pyuvm versus plain cocotb for your project yet.'
- type: bullets
  title: Pitfalls to watch
  bullets:
  - Do not treat the map as one-to-one syntax, APIs differ even when roles match
  - A common miss is assuming pyuvm is required for every cocotb bench
  - Another trap is mapping driver to raw Python assigns when you already built a
    pyuvm agent
  - And remember
  notes: 'Do not treat the map as one-to-one syntax—APIs differ even when roles match.
    A common miss is assuming pyuvm is required for every cocotb bench; plain cocotb
    with asserts is valid. Another trap is mapping driver to raw Python assigns when
    you already built a pyuvm agent. And remember: the browser cards are literacy;
    real fidelity is reading both a cocotb test and a UVM test for the same DUT.'
- type: bullets
  title: Your turn
  bullets:
  - Complete the checklist for at least one track, preferably both
  - In the browser, load the starter and name what dut maps to on the UVM side
  - On paper, fill in test and await for both columns without looking
  - When you are ready
  notes: Complete the checklist for at least one track—preferably both. In the browser,
    load the starter and name what dut maps to on the UVM side. On paper, fill in
    test and await for both columns without looking. When you are ready, take the
    short quiz, then continue to the self-check pattern in the next module.
